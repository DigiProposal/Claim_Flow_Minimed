function Dot({s,size=10}){
  return <span style={{width:size,height:size,borderRadius:"50%",background:SEM_COLOR[s],display:"inline-block",flexShrink:0}}/>;
}
function SemBadge({s}){
  return <span style={{background:SEM_BG[s],color:SEM_COLOR[s],padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4}}>
    <Dot s={s} size={7}/>{SEM_LABEL[s]}
  </span>;
}
function EsBadge({e}){
  const map={"Cobrado":["#ccfbf1","#0f766e"],"Reclamo Presentado":["#dbeafe","#1d4ed8"],"En Análisis de Cuenta":["#e0e7ff","#3730a3"],"Preautorización Enviada":["#fef9c3","#a16207"],"Nuevo Ingreso":["#f1f5f9","#475569"],"Validación de Póliza":["#fee2e2","#dc2626"],"Con Glosa":["#fee2e2","#dc2626"],"En espera de pago":["#fef9c3","#a16207"]};
  const [bg,cl]=map[e]||["#f1f5f9","#475569"];
  return <span style={{background:bg,color:cl,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{e}</span>;
}
function PBar({p,w=70}){
  const c=p>=80?"#16a34a":p>=50?"#d97706":"#dc2626";
  return <div style={{height:5,background:"#e2e8f0",borderRadius:3,overflow:"hidden",width:w,flexShrink:0}}>
    <div style={{height:"100%",background:c,width:p+"%",borderRadius:3}}/>
  </div>;
}

}
function Btn({ch,v="pri",onClick,dis,style={}}){

  return <button onClick={dis?undefined:onClick} style={{padding:"6px 13px",borderRadius:7,fontSize:11,fontWeight:600,border:"none",cursor:dis?"not-allowed":"pointer",display:"inline-flex",alignItems:"center",gap:5,fontFamily:"inherit",...(dis?st.dis:st[v]),...style}}>{ch}</button>;
}
function Card({ch,style={}}){
  return <div style={{background:"white",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",borderTop:`3px solid ${TEAL}`,...style}}>{ch}</div>;
}
function ST({ch}){
  return <div style={{fontSize:11,fontWeight:700,color:NAVY,textTransform:"uppercase",letterSpacing:".8px",marginBottom:10}}>{ch}</div>;
}

          {[["res","Resumen"],["ch","Checklist"],["hi","Historial"]].map(([v,l])=>

          )}
        </div>
      </div>
      <div style={{padding:18,overflow:"auto"}}>
        {t==="res" && <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            {[["Cédula",caso.cedula],["Servicio",caso.tipoServicio],["Analista",caso.analista],["Prioridad",caso.prioridad],["Días",caso.diasEnProceso+" días"],["Aseguradora",caso.aseguradora]].map(([k,v])=>
              <div key={k} style={{background:"#f8fafc",borderRadius:7,padding:"8px 10px"}}>
                <div style={{fontSize:9,color:"#94a3b8",fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>{k}</div>
                <div style={{fontSize:12,fontWeight:600,color:"#1e293b"}}>{v}</div>
              </div>
            )}
          </div>
          <div style={{background:"#f8fafc",borderRadius:8,padding:12,marginBottom:12}}>
            <ST ch="Preautorización"/>
            <div style={{fontSize:11,color:"#475569"}}><b>N°:</b> {caso.preautNumero||"—"} &nbsp;&middot;&nbsp; <b>Estado:</b> {caso.preautEstado} {caso.cobertura&&<>&nbsp;&middot;&nbsp;<b>Cobertura:</b> {caso.cobertura}</>}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            <div style={{background:"#eff6ff",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:9,color:"#6b7280",marginBottom:2}}>MONTO PRE</div>
              <div style={{fontSize:18,fontWeight:800,color:"#1d4ed8"}}>{fmt(caso.montoPre)}</div>
            </div>
            {caso.montoAprobado&&<div style={{background:"#f0fdf4",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:9,color:"#6b7280",marginBottom:2}}>APROBADO</div>
              <div style={{fontSize:18,fontWeight:800,color:"#16a34a"}}>{fmt(caso.montoAprobado)}</div>
            </div>}
          </div>
          {caso.pendientes.length>0&&<>
            <ST ch="⚠ Pendientes"/>
            {caso.pendientes.map((p,i)=><div key={i} style={{background:"#fffbeb",borderLeft:"3px solid #d97706",borderRadius:6,padding:"7px 10px",fontSize:11,color:"#475569",marginBottom:6}}>{p}</div>)}
          </>}
        </>}
        {t==="ch" && <>
          <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>Completado: {caso.pct}%</div>
          <PBar p={caso.pct} w={200}/>
          <div style={{height:14}}/>
          {CHECKLIST.map(doc=><div key={doc.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:"#f8fafc",borderRadius:7,marginBottom:6}}>
            <span style={{fontSize:16}}>{doc.estado==="ok"?"✅":doc.estado==="pendiente"?"⏳":"❌"}</span>
            <div style={{flex:1,fontSize:12}}>{doc.nombre}</div>

        </>}
        {t==="hi" && <div style={{paddingLeft:18,borderLeft:"2px solid #e2e8f0"}}>
          {hist.map((h,i)=><div key={i} style={{marginBottom:14,position:"relative"}}>
            <div style={{position:"absolute",left:-22,top:4,width:8,height:8,borderRadius:"50%",background:TEAL}}/>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{h.f}</div>
            <div style={{fontSize:12,color:"#475569"}}>{h.tx}</div>
          </div>)}
        </div>}
      </div>
    </div>
  </>;
}

    <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>Control de reclamos presentados &middot; SLA por aseguradora &middot; Gestión de glosas</div>

      {TABS.map(([v,l])=><div key={v} onClick={()=>setTab(v)} style={{padding:"6px 14px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",background:tab===v?"white":"transparent",color:tab===v?NAVY:"#64748b",boxShadow:tab===v?"0 1px 3px rgba(0,0,0,.1)":"none"}}>{l}</div>)}
    </div>
    {tab==="pres"&&reclamos.map(r=>{const g=guardados.find(x=>x.id===r.id);return(
      <Card key={r.id} style={{padding:14,marginBottom:10,borderLeft:"3px solid "+TEAL,borderTop:"none"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <div><div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{r.p}</div><div style={{display:"flex",gap:8,marginTop:3}}><span style={{background:"#dbeafe",color:"#1d4ed8",padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:600}}>{r.a}</span><span style={{fontSize:11,color:"#94a3b8",fontFamily:"monospace"}}>{r.id}</span></div></div>
          <div style={{fontSize:18,fontWeight:800,color:NAVY,fontFamily:"monospace"}}>{fmt(r.m)}</div>
        </div>
        <div style={{display:"flex",gap:20,alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:11,color:"#64748b"}}><b>Presentado:</b> {r.fecha} &middot; <b>{r.dias} días</b></span>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}><span style={{fontSize:10,color:"#94a3b8",whiteSpace:"nowrap"}}>SLA {r.a}:</span><SlaBar dias={r.dias} sla={r.sla}/></div>
        </div>
        <div style={{fontSize:11,color:"#475569",background:"#f8fafc",padding:"7px 10px",borderRadius:6,marginBottom:10}}>
          💬 {g?g.txt:r.ult}{g&&<span style={{fontSize:9,color:"#94a3b8",marginLeft:6}}>— actualizado {g.f}</span>}
        </div>
        <div style={{display:"flex",gap:8}}><Btn ch="📝 Registrar Seguimiento" onClick={()=>setModal(r)}/><Btn ch="✓ Marcar Pagado" v="suc"/><Btn ch="⚠ Reportar Glosa" v="dan"/></div>
      </Card>
    );})}
    {tab==="glosas"&&glosas.map(g=><Card key={g.id} style={{padding:14,marginBottom:10,borderTop:"none",borderLeft:"3px solid #d97706"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <div><div style={{fontSize:13,fontWeight:700}}>{g.p}</div><span style={{background:"#fef9c3",color:"#a16207",padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:600}}>{g.a}</span></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:15,fontWeight:800,color:NAVY,fontFamily:"monospace"}}>{fmt(g.m)}</div><div style={{fontSize:11,color:"#dc2626",fontWeight:600}}>Glosado: {fmt(g.g)}</div></div>
      </div>
      <div style={{fontSize:11,color:"#475569",marginBottom:10}}><b>Motivo:</b> {g.motivo}</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{background:g.est==="En apelación"?"#fef9c3":g.est==="Aceptada"?"#dcfce7":"#f1f5f9",color:g.est==="En apelación"?"#a16207":g.est==="Aceptada"?"#16a34a":"#475569",padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600}}>{g.est}</span>
        <Btn ch="Gestionar Glosa →" v="sec"/>
      </div>
    </Card>)}
    {tab==="cob"&&cobrados.map(c=><Card key={c.id} style={{padding:14,marginBottom:10,borderTop:"none",borderLeft:"3px solid #16a34a"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:13,fontWeight:700}}>{c.paciente}</div><div style={{display:"flex",gap:8,marginTop:3}}><span style={{background:"#dcfce7",color:"#16a34a",padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:600}}>✅ Cobrado</span><span style={{background:"#f1f5f9",color:"#475569",padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:600}}>{c.aseguradora}</span></div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:800,color:"#16a34a",fontFamily:"monospace"}}>{fmt(c.montoAprobado||c.montoPre)}</div><div style={{fontSize:10,color:"#94a3b8"}}>{c.diasEnProceso} días de ciclo</div></div>
      </div>
    </Card>)}
    {modal&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.4)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"white",borderRadius:12,padding:24,width:400,boxShadow:"0 10px 40px rgba(0,0,0,.2)"}}>
        <div style={{fontSize:15,fontWeight:700,color:NAVY,marginBottom:16}}>📝 Registrar Seguimiento — {modal.p}</div>
        {[["Canal",<select style={ss} value={canal} onChange={e=>setCanal(e.target.value)}><option>Plataforma ASSA</option><option>Correo electrónico</option><option>Teléfono</option><option>Chat con case manager</option></select>],["Resultado",<textarea placeholder='Ej: "Case manager confirmó recepción del expediente"' value={txt} onChange={e=>setTxt(e.target.value)} style={{...ss,resize:"vertical",minHeight:70}}/>],["Próximo seguimiento",<input type="date" style={ss}/>]].map(([l,f])=>
          <div key={l} style={{marginBottom:12}}><label style={{fontSize:10,fontWeight:600,color:"#64748b",textTransform:"uppercase",display:"block",marginBottom:4,letterSpacing:.5}}>{l}</label>{f}</div>
        )}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn ch="Cancelar" v="sec" onClick={()=>setModal(null)}/><Btn ch="💾 Guardar Seguimiento" onClick={guardar}/>
        </div>
      </div>
    </div>}
  </div>;
}

function App(){
  const [scr,setScr]=useState("dash");
  const NAV=[["dash","📊","Dashboard Ejecutivo"],["casos","📋","Casos Activos"],["check","✅","Checklist Documental"],["motor","🚦","Motor de Validación"],["seg","💰","Seguimiento y Cobro"]];
  const SCREENS={dash:<Dashboard/>,casos:<Casos/>,check:<Checklist setScr={setScr}/>,motor:<Motor/>,seg:<Seguimiento/>};
  return <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",fontFamily:"system-ui,sans-serif",background:"#F1F5F9"}}>
    <div style={{background:NAVY,color:"white",height:52,display:"flex",alignItems:"center",padding:"0 20px",justifyContent:"space-between",flexShrink:0,borderBottom:"2px solid "+TEAL,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10,fontSize:15,fontWeight:700,letterSpacing:-.3}}>
        <div style={{width:8,height:8,background:TEAL2,borderRadius:"50%"}}/>
        <span>ClaimFlow</span>
        <span style={{color:TEAL2,fontWeight:800}}>Minimed</span>
        <span style={{fontSize:11,color:"#94a3b8",fontWeight:400,marginLeft:4}}>&middot; Gestión de Reclamos</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:16,fontSize:12,color:"#cbd5e1"}}>
        <div style={{position:"relative",cursor:"pointer"}}>🔔<span style={{position:"absolute",top:-4,right:-4,background:"#dc2626",color:"white",borderRadius:"50%",width:14,height:14,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>3</span></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><Av name="Steffany Peralta"/><span>Steffany Peralta</span><span style={{color:"#4b6cb7",fontSize:10}}>Analista Senior</span></div>
        <span style={{color:"#4b6cb7",fontSize:10}}>| Abr 2026</span>
      </div>
    </div>
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div style={{width:200,background:NAVY,flexShrink:0,display:"flex",flexDirection:"column",borderRight:"1px solid rgba(255,255,255,.05)",overflow:"auto"}}>
        <div style={{padding:"16px 0 8px"}}>
          <div style={{fontSize:9,fontWeight:700,color:"#4b6cb7",letterSpacing:1.5,textTransform:"uppercase",padding:"0 16px 8px"}}>Módulos</div>
          {NAV.map(([id,ic,lb])=><div key={id} onClick={()=>setScr(id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 16px",cursor:"pointer",color:scr===id?TEAL2:"#94a3b8",fontSize:12,fontWeight:500,background:scr===id?"rgba(0,168,150,.12)":"transparent",borderLeft:scr===id?"3px solid "+TEAL2:"3px solid transparent"}}>
            <span style={{fontSize:14,width:18,textAlign:"center"}}>{ic}</span>{lb}
          </div>)}
        </div>
        <div style={{height:1,background:"rgba(255,255,255,.07)",margin:"8px 16px"}}/>
        <div style={{padding:"8px 0"}}>
          <div style={{fontSize:9,fontWeight:700,color:"#4b6cb7",letterSpacing:1.5,textTransform:"uppercase",padding:"0 16px 8px"}}>Sistema</div>
          {[["📚","Base de Conocimiento"],["⚙","Configuración"]].map(([ic,lb])=><div key={lb} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 16px",cursor:"pointer",color:"#94a3b8",fontSize:12,fontWeight:500}}><span style={{fontSize:14,width:18,textAlign:"center"}}>{ic}</span>{lb}</div>)}
        </div>
        <div style={{padding:14,marginTop:"auto"}}>
          <div style={{background:"rgba(0,168,150,.1)",border:"1px solid rgba(0,168,150,.2)",borderRadius:8,padding:10}}>
            <div style={{fontSize:9,color:TEAL2,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Cartera Activa</div>
            <div style={{fontSize:18,fontWeight:800,color:"white",fontFamily:"monospace"}}>$142,800</div>
            <div style={{fontSize:10,color:"#64748b",marginTop:2}}>38 casos en gestión</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflow:"auto",padding:20}}>
        {SCREENS[scr]||<div style={{padding:32,textAlign:"center",color:"#94a3b8"}}>Módulo en construcción</div>}
      </div>
    </div>
  </div>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
</html>
